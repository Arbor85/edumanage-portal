services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edumanage-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/app.db
    volumes:
      - ./backend:/app
      - backend_db:/data

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: edumanage-web
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_API_SECURE_URL=http://localhost:8000/api
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  backend_db: